version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: nl-test-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: nl_test
      MYSQL_USER: nltest
      MYSQL_PASSWORD: nltest123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: nl-test-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://nltest:nltest123@mysql:3306/nl_test
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ../screenshots:/app/screenshots

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: nl-test-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mysql_data:
